<div [class]="['f24-preview-container', orientation()]">
  @if (label(); as label) {
    <p class="f24-preview-label">
      {{ label }}
    </p>
  }
  @if (value(); as value) {
    <div class="f24-preview-content">
      <p class="f24-preview-text">
        {{ value }}
      </p>
      @if(copyText(); as copyText) {
        <f24-copy [copy]="copyText"/>
      }
    </div>
  }
</div>
