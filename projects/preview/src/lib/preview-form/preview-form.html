@if (_visible() && !hidden()) {
  <section>
    @if (_checked()) {
      <div class="f24-preview-checked" animate.enter="fade-in" animate.leave="fade-out"
        (animate.enter)="onLeaveAnimationDone($event)"
        (animate.leave)="onEnterAnimationDone($event)"
      >
        <ng-content select="[checked]"></ng-content>
        
        <button matIconButton color="primary" (click)="unchecked()" [disabled]="!clear()">
          <mat-icon>delete_sweep</mat-icon>
        </button>
         
      </div>
    } @else {
      <div class="f24-preview-unchecked" animate.enter="fade-in" animate.leave="fade-out"
        (animate.enter)="onEnterAnimationDone($event)"
        (animate.leave)="onLeaveAnimationDone($event)"
      >
        @if (title()) {
          <div class="f24-preview-unchecked-title">
            {{title()}}  
          </div>
        }
        <ng-content select="[unchecked-title]"></ng-content>
        <ng-content select="[unchecked]"></ng-content>
        
        @if (!auto()) {
          <div class="f24-preview-actions">
            <button matButton color="primary" (click)="unchecked()">
              <mat-icon>delete_sweep</mat-icon> {{ labelClear() }}
            </button>
            <button matButton color="primary" (click)="next()">
              <mat-icon>check</mat-icon> {{ labelNext() }}
            </button>
          </div>
        }
      </div>
    }
    
  </section>
}
