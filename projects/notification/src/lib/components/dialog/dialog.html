<ng-template #template>
  <div class="f24-dialog-header">
    @if(title(); as title) {
      <h2 mat-dialog-title>{{ title }}</h2>
    }
    <div class="f24-dialog-buttons">
      <button matIconButton>
        <mat-icon (click)="close()">close</mat-icon>
      </button>
    </div>
  </div>
  <mat-dialog-content>
    <ng-content></ng-content>
    @if (templateRef(); as templateRef) {
      <ng-container [ngTemplateOutlet]="templateRef"></ng-container>
    }
  </mat-dialog-content>
  @if (accept() && cancel()) {
    <mat-dialog-actions>
      <button matButton (click)="onCancel(); close()">{{ cancel() }}</button>
      <button matButton (click)="onAccept(); close()" cdkFocusInitial>{{ accept() }}</button>
    </mat-dialog-actions>
  }
</ng-template>
