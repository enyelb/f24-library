<div
  role="group"
  [class]="class('container')"
  [formGroup]="parts"
  [attr.aria-labelledby]="formField?.getLabelId()"
  (focusin)="onFocusIn()"
  (focusout)="onFocusOut($event)"
>
  <input
    [class]="class('element')"
    formControlName="area"
    size="3"
    maxLength="4"
    aria-label="Area code"
    (input)="input(parts.controls.area, exchange)"
    #area
  />
  <span [class]="class('spacer')">&ndash;</span>
  <input
    [class]="class('element')"
    formControlName="exchange"
    maxLength="3"
    size="3"
    aria-label="Exchange code"
    (input)="input(parts.controls.exchange, subscriber)"
    (keyup.backspace)="autoFocusPrev(parts.controls.exchange, area)"
    #exchange
  />
  <span [class]="class('spacer')">&ndash;</span>
  <input
    [class]="class('element')"
    formControlName="subscriber"
    maxLength="4"
    size="4"
    aria-label="Subscriber number"
    (input)="input(parts.controls.subscriber)"
    (keyup.backspace)="autoFocusPrev(parts.controls.subscriber, exchange)"
    #subscriber
  />
</div>
