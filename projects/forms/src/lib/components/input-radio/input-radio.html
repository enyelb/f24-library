<div
  #container
  [class]="class('container')"
  [attr.aria-labelledby]="formField?.getLabelId()"
  (focusin)="onFocusIn()"
  (focusout)="onFocusOut($event)"
>
  <mat-radio-group [formControl]="control" [class]="class()">
    @if (itemsMaps().length > limit) {
      <div [class]="class('filter')" row>
        <f24-filter-input 
          [col]="{ xs: 20, s: 12, m: 11,  l: 10, xl: 9, xxl: 8 }"
          [params]="{
            icon: 'search',
            label: 'Buscar',
            change: change,
          }"
        />
      </div>
    }
    @if (itemsFiltered().length > 0) {
      <div [class]="class('items')">
        @for (item of itemsFiltered(); track $index) {
          <mat-radio-button
            [value]="item.value || 0"
            [class]="class('button')"
            [labelPosition]="'before'"
            [checked]="control.value === item.value"
          >
            <div [class]="class('button-content')">
              @if (item.title) {
                {{ item.title }}
              }
              @if (item.icon) {
                @if (item.isMaterialIcon()) {
                  <mat-icon #icon [class]="class('icon')" (error)="item.isMaterialIcon.set(false)">{{ item.icon }}</mat-icon>
                } @else if (item.isSVGIcon()) {
                  <mat-icon [class]="class('icon')" (error)="item.isSVGIcon.set(false)" [svgIcon]="item.icon"></mat-icon>
                }
              }
            </div>
          </mat-radio-button>
        }
      </div>
    }
  </mat-radio-group>
</div>
