<div class="f24-form-input-container">
  <mat-form-field [appearance]="source().appearance()" class="f24-form-input">

    <mat-label>{{ source().label() }}</mat-label>

    <mtx-select
      [placeholder]="source().placeholder()"
      [formControl]="source().form()"
      [items]="source().items()"
      [bindLabel]="source().bindLabel()"
      [bindValue]="source().bindValue()"
      [multiple]="source().multiple()"
    >
      <ng-template ng-label-tmp let-item="item" let-clear="clear" class="m2">
        {{ source().formatterLabel()(item)}}
        <span class="ng-value-icon right" (click)="clear(item)">×</span>
      </ng-template>
      <ng-template ng-option-tmp let-item="item">
        {{ source().formatterValue()(item)}} 
      </ng-template>
    </mtx-select>

    <!-- Mostrar errores -->
    <mat-error>
      <f24-form-errors [errors]="source().form().errors"/>
    </mat-error>
  </mat-form-field>
</div>
