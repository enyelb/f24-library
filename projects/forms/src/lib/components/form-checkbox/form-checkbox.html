<div [class]="'f24-form-checkbox-container'">
  <mat-form-field appearance="outline" class="f24-form-checkbox">
    <mat-label>{{ source().label() }}</mat-label>
    <f24-input-checkbox
      matInput
      [items]="source().items()"
      [bindValue]="source().bind().value"
      [bindTitle]="source().bind().label"
      [bindIcon]="source().bind().icon"
      [formControl]="source().form()"
    />
    <mat-error>
      <f24-form-errors [errors]="source().form().errors"/>
    </mat-error>
  </mat-form-field>
</div>
