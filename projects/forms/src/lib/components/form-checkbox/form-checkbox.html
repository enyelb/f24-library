<div [class]="'f24-form-checkbox-container'">
  <mat-form-field [appearance]="source().appearance()" class="f24-form-checkbox">
    <mat-label>{{ source().label() }}</mat-label>
    <f24-input-checkbox
      matInput
      [items]="source().items()"
      [bindValue]="source().bindValue()"
      [bindTitle]="source().bindLabel()"
      [bindIcon]="source().bindIcon()"
      [formControl]="source().form()"
      [limit]="source().limit()"
    />
    <mat-error>
      <f24-form-errors [errors]="source().form().errors"/>
    </mat-error>
  </mat-form-field>
</div>
