<div class="f24-form-phone-container">
  <mat-form-field appearance="outline" class="f24-form-phone">
    <mat-label>{{ label() }}</mat-label>
    <f24-input-phone
      matInput
      [placeholder]="placeholder()"
      [formControl]="control()"
      (input)="changeEmit()"
    />
    <mat-icon matSuffix color="primary">phone</mat-icon>
    <mat-error>
      <f24-form-errors [errors]="control().errors"/>
    </mat-error>
  </mat-form-field>
</div>
