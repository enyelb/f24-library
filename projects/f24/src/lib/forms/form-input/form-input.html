<div class="f24-form-input-container">
  <mat-form-field appearance="outline" class="f24-form-input">

    <mat-label>{{ label() }}</mat-label>

    <input
      matInput
      [placeholder]="placeholder()"
      [type]="type()"
      [formControl]="control()"
      (input)="changeEmit()"
    >

    <!-- Mostrar errores -->
    <mat-error>
      <f24-form-errors [errors]="control().errors"/>
    </mat-error>
    <!-- Icono de estado -->
    @if (control().valid) {
      <mat-icon matSuffix color="primary">check</mat-icon>
    }
  </mat-form-field>
</div>
