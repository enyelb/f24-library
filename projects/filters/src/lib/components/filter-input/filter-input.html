<div class="f24-filter-input-container">
  <!-- FILTER -->
  <mat-form-field class="f24-filter-input" [appearance]="source().appearance()">
    <mat-label>{{ source().label() }}</mat-label>
    <input matInput placeholder="{{ source().placeholder() }}" #input [formControl]="source().form()" >

    @if (source().form().value) {
      <button matSuffix mat-icon-button aria-label="Clear" (click)="source().form().setValue(null)">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>
  <ng-content></ng-content>
</div>
