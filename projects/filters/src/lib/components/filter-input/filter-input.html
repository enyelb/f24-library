<div class="f24-filter-input-container">
  <!-- FILTER -->
  <mat-form-field class="f24-filter-input" [appearance]="source().appearance()">
    <mat-label>{{ source().label() }}</mat-label>
    <input matInput #input 
      [placeholder]="source().placeholder()" 
      [formControl]="source().form()"
      [type]="source().type()"
    >

    @if (source().form().value) {
      <button matSuffix mat-icon-button aria-label="Clear" (click)="source().form().setValue(null)">
        <f24-icon icon="close"/>
      </button>
    }

    @if (source().icon(); as icon) {
      <f24-icon class="f24-filter-prefix-icon" matPrefix [icon]="icon"/>
    }
  </mat-form-field>
  <ng-content></ng-content>
</div>
