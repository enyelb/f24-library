

<div class="f24-filter-date-range-container">
  <!-- DATE RANGE -->
  <mat-form-field class="f24-filter-date-range" [appearance]="source().appearance()">
    <mat-label>{{ source().label() }}</mat-label>
    <mat-date-range-input [rangePicker]="picker">
      <input matStartDate [formControl]="source().fromForm()" [placeholder]="source().fromPlaceholder()">
      <input matEndDate [formControl]="source().toForm()" [placeholder]="source().toPlaceholder()">
    </mat-date-range-input>
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-date-range-picker #picker disabled="false" [touchUi]="source().isTouchUi()">
      <mat-date-range-picker-actions>
        <button mat-button matDateRangePickerCancel>{{ source().labelCancel() }}</button>
        <button mat-raised-button color="primary" matDateRangePickerApply>{{ source().labelApply() }}</button>
      </mat-date-range-picker-actions>
    </mat-date-range-picker>
  </mat-form-field>
  <ng-content></ng-content>
</div>
