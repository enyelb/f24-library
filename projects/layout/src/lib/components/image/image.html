@if (safeUrl()) {
  <img [class]="{ 'f24-image': true, 'f24-image-zoom-click': zoomClick() }" loading="lazy"
    [srcset]="safeUrl()"
    [src]="safeUrl()"
    [alt]="alt()"
    (error)="reportError()" 
    (click)="open()">
}

@if (zoomClick()) {
  <f24-dialog [size]="zoomSize()">
    <img class="f24-image-zoom" loading="lazy"
      [srcset]="safeUrl()"
      [src]="safeUrl()"
      [alt]="alt()">
  </f24-dialog>
}
