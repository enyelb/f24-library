<div class="description-container">
  <div class="description">
    <p class="title">
      {{ description() }}
      @if (icon() && !icon()?.hide) {
        <f24-icon class="icon" [icon]="icon()?.name ?? ''" [matTooltip]="icon()?.tooltip ?? ''"/>
      }
    </p>

    <div class="list">
      @for (item of items(); track $index) {
        <f24-icon [icon]="item.icon"/><p>{{ item.text }}</p>
      }
    </div>
  </div>
  <ng-content [right]></ng-content>
</div>
