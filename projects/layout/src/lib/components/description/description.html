<div class="descripcion-container">
  <div class="descripcion">
    <p class="title">
      {{ description() }}
      @if (icon() && !icon()?.hide) {
        <mat-icon
          [matTooltip]="icon()?.tooltip ?? ''"
          [class]="icon()?.color ?? ''"
        >
          {{icon()?.name}}
        </mat-icon>
      }
    </p>

    <div class="list">
      @for (item of items(); track $index) {
        <mat-icon>{{item.icon}}</mat-icon> <p>{{ item.text }}</p>
      }
    </div>
  </div>
  <ng-content [right]></ng-content>
</div>
