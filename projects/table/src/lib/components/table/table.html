<!-- PROGRESS BAR -->
@if (source().loading()) {
  <div class="f24-table-progress-bar">
    <mat-progress-bar color="primary" mode="indeterminate"/>
  </div>
}

<!-- HEADER CONTENT -->
<div class="f24-table-header-content">
  <!-- HEADER CONTENT EXTRA -->
  <ng-content select="[header]"></ng-content>
</div>

<!-- TABLE CONTENT -->
<div [class]="{'f24-table-content': true, 'f24-table-content-no-result': source().total() === 0 }">
  <ng-content></ng-content>

  @if (isVirtualScroll()) {
    <cdk-virtual-scroll-viewport [itemSize]="itemSize()" [maxBufferPx]="itemSize() * 40" [minBufferPx]="itemSize() * 10"> 
      <f24-table-standard #f24TableVirtual 
        [source]="source()" 
        [columns]="columns()" 
        [columnSelects]="columnSelects()" 
        [isVitualScroll]="isVirtualScroll()"
        [color]="color()"
        [rowClass]="_rowClass()"
      />
    </cdk-virtual-scroll-viewport>
  } @else {
    <f24-table-standard
      [source]="source()"
      [columns]="columns()"
      [columnSelects]="columnSelects()"
      [color]="color()"
      [rowClass]="_rowClass()"
    />
  }
  
</div>
<!-- PAGINATION -->
@if (source().total() > source().data().length) {
  <mat-paginator  #paginator showFirstLastButtons
    [class]="{
      'f24-teble-pagination': true,
      'f24-table-pagination-all': paginator.pageSize === 100000
    }"
    [pageIndex]="source().pageIndex()"
    [pageSize]="source().pageSize()"
    [length]="source().total()"
    [pageSizeOptions]="source().pageOptions()">
  </mat-paginator>
}
